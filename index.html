<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card designing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alyamama:wght@300..900&family=Amita:wght@400;700&family=Betania+Patmos&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: bisque;
            padding: 420px;
            display: flex;
        }

        .content p {
            font-size: smaller;
            color: gray;
            font-family: "Open Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
            font-variation-settings:
                "wdth" 100;
            ;
        }

        .card {
            background-color: white;
            width: 232px;
            height: 444px;
            border-radius: 7px;
        }

        .image {
            padding: 9px;

        }

        .content {
            padding: 3px 1px;
        }

        .content h1 {
            padding: 0px;
            margin: 0px;

        }

        .image img {
            border-radius: 9px;
        }

        .capsules {
            padding: 0 34px;
        }

        .capsules span {
            border: 2px solid rgb(158, 153, 153);
            padding: 0px 6px;
            border-radius: 7px;
            font-size: small;
        }

        .button {
            text-align: center;
            padding: 8px;
        }

        .button button {
            padding: 3px 13px;
             border-radius:15px ;
             border: none;
             cursor: pointer;
             color: rgb(124, 162, 168);
             background-color:rgb(255, 255, 255) 
             
        }
        .button button:hover{
             color: rgb(124, 162, 168);
             background-color:rgb(255, 255, 255) 

        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="210px" height="120px" src="flowers card pic.jpeg" alt>


        </div>
        <div class="capsules">
            <span>Shop</span>
            <span>Contact</span>


            <div class="content">
                <h2>Flower's </h2>
                <h2>shop</h2>
                <p> Flowers have a timeless way of expressing emotions that words often cannot. A flower shop is more
                    than just
                    a place to buy bouquets. It is where celebrations begin and memories are honored. </p>
                <div class="button">
                    <button>Read more</button>
                </div>
            </div>
                
            

</body>
